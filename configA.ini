# 1. 过滤掉废节点 + 换一个响应更快的 CF 测速点
custom_proxy_group=⚡ 自动容灾`url-test`^(?!(.*(流量|到期|官网|订阅))).*$`http://cloudflare.com`900`300`10

# 2. 增加一个“故障转移”逻辑，如果自动组由于某种原因卡住，强制你手动能切
custom_proxy_group=✌️ 手动选择`select`[]⚡ 自动容灾`[]DIRECT`^(?!(.*(流量|到期|官网|订阅))).*$

# 3. TikTok 专用 (剔除港台)
custom_proxy_group=💃 TikTok`select`^((?!(香港|hk|hong kong|hkg|台湾|tw|taiwan|印度)).)*$`[]✌️ 手动选择

